<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megawatts Nigeria — Project Live Status</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#F0F4F8;color:#2D3748;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{background:#0D7377;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.topbar-brand{display:flex;flex-direction:column;}
.topbar-company{font-size:13px;font-weight:700;color:#fff;letter-spacing:.04em;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.7);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;font-size:11px;color:#fff;font-weight:600;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.topbar-date{font-size:11px;color:rgba(255,255,255,.7);}

/* ── PROJECT SELECTOR ── */
.proj-selector{background:#fff;border-bottom:1px solid #E2E8F0;padding:10px 20px;display:flex;align-items:center;gap:12px;overflow-x:auto;}
.proj-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid #E2E8F0;background:#fff;color:#4A5568;white-space:nowrap;transition:all .15s;}
.proj-btn.active{background:#0D7377;color:#fff;border-color:#0D7377;}
.proj-btn:hover:not(.active){border-color:#0D7377;color:#0D7377;}

/* ── MAIN ── */
.main{max-width:1100px;margin:0 auto;padding:20px 16px;}

/* ── PROJECT HEADER ── */
.proj-header{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.proj-header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
.proj-id{font-size:11px;font-weight:700;color:#0D7377;letter-spacing:.05em;text-transform:uppercase;}
.proj-title{font-size:22px;font-weight:700;color:#0D1B3E;margin:4px 0;}
.proj-meta{font-size:13px;color:#8B9BB4;}
.rag-pill{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.04em;}
.rag-green{background:#E2EFDA;color:#1E6B2E;}
.rag-amber{background:#FFF3CC;color:#92400E;}
.rag-red{background:#FFDCDC;color:#9B1C1C;}
.rag-complete{background:#DDEEFF;color:#185FA5;}

/* ── PROGRESS BAR ── */
.progress-section{margin-top:16px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;}
.progress-label-left{font-weight:600;color:#0D1B3E;}
.progress-label-right{color:#8B9BB4;}
.progress-track{height:12px;background:#EEF2F8;border-radius:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;transition:width .6s ease;}

/* ── KPI TILES ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px;}
.kpi-tile{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.kpi-tile-label{font-size:11px;font-weight:600;color:#8B9BB4;text-transform:uppercase;letter-spacing:.05em;}
.kpi-tile-val{font-size:22px;font-weight:700;color:#0D1B3E;margin-top:4px;}
.kpi-tile-sub{font-size:11px;color:#8B9BB4;margin-top:2px;}

/* ── SECTION CARDS ── */
.section-card{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.section-title{font-size:13px;font-weight:700;color:#0D1B3E;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:"";flex:1;height:1px;background:#EEF2F8;}

/* ── MILESTONE LIST ── */
.milestone-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #F4F6F9;}
.milestone-item:last-child{border-bottom:none;}
.ms-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ms-icon-complete{background:#E2EFDA;}
.ms-icon-inprog{background:#FFF3CC;}
.ms-icon-pending{background:#F4F6F9;}
.ms-icon-outstanding{background:#FFDCDC;}
.ms-info{flex:1;}
.ms-name{font-size:13px;font-weight:600;color:#0D1B3E;}
.ms-date{font-size:11px;color:#8B9BB4;margin-top:2px;}
.ms-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;white-space:nowrap;}
.ms-status-complete{background:#E2EFDA;color:#1E6B2E;}
.ms-status-inprog{background:#FFF3CC;color:#92400E;}
.ms-status-pending{background:#F4F6F9;color:#8B9BB4;}
.ms-status-outstanding{background:#FFDCDC;color:#9B1C1C;}
.ms-pct{font-size:12px;font-weight:700;color:#0D1B3E;width:36px;text-align:right;}

/* ── TASKS ── */
.task-item{padding:10px 0;border-bottom:1px solid #F4F6F9;}
.task-item:last-child{border-bottom:none;}
.task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.task-name{font-size:13px;font-weight:500;color:#2D3748;}
.task-pct{font-size:12px;font-weight:700;}
.task-bar-track{height:6px;background:#EEF2F8;border-radius:3px;overflow:hidden;}
.task-bar-fill{height:100%;border-radius:3px;}

/* ── UPDATE LOG ── */
.update-item{padding:12px;background:#F9FAFC;border-radius:8px;margin-bottom:8px;border-left:3px solid #0D7377;}
.update-meta{font-size:11px;color:#8B9BB4;margin-bottom:4px;}
.update-text{font-size:13px;color:#2D3748;line-height:1.5;}

/* ── FOOTER ── */
.footer{text-align:center;padding:24px 16px;font-size:11px;color:#8B9BB4;}
.footer strong{color:#0D7377;}

/* ── LOADING / ERROR ── */
.loading{text-align:center;padding:60px 20px;}
.loading-spinner{width:40px;height:40px;border:3px solid #EEF2F8;border-top-color:#0D7377;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#FFDCDC;border-radius:10px;padding:20px;text-align:center;color:#9B1C1C;margin:40px auto;max-width:400px;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .main{padding:12px 10px;}
  .proj-title{font-size:18px;}
  .kpi-tile-val{font-size:18px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-company">Megawatts Nigeria Limited</div>
    <div class="topbar-sub">Live Project Status Portal</div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    <div class="topbar-date" id="portal-date"></div>
  </div>
</div>

<div class="proj-selector" id="proj-selector" style="display:none"></div>

<div class="main" id="portal-main">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div style="font-size:14px;color:#8B9BB4">Loading project data...</div>
  </div>
</div>

<div class="footer">
  <strong>Megawatts Nigeria Limited</strong> &nbsp;·&nbsp; PMO Portfolio System &nbsp;·&nbsp;
  Data updates in real time &nbsp;·&nbsp; PMO Lead: Toyib Salam Olanrewaju, PMP
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDRfBRxxHbzRYXK8t3l8utsFDCyLTO-JbE",
    authDomain: "megawatts-pmo.firebaseapp.com",
    projectId: "megawatts-pmo",
    storageBucket: "megawatts-pmo.firebasestorage.app",
    messagingSenderId: "671522879332",
    appId: "1:671522879332:web:9d9e082978a49b974aac71"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── Read URL parameters ──────────────────────────────────────────────────
  const params   = new URLSearchParams(window.location.search);
  const projParam = params.get('project'); // e.g. ?project=PRJ-001
  const clientKey = params.get('key');     // optional security key

  // ── Update date ──────────────────────────────────────────────────────────
  document.getElementById('portal-date').textContent =
    new Date().toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});

  // ── Load projects from Firebase ──────────────────────────────────────────
  let _projects = [];
  let _activeId = projParam || null;

  async function loadProjects() {
    try {
      const snap = await getDocs(collection(db, 'projects'));
      _projects = [];
      snap.forEach(d => {
        const p = d.data();
        // Restore arrays
        if (Array.isArray(p.milestones)) p.milestones = p.milestones.map(m=>
          Array.isArray(m)?m:{...m});
        if (Array.isArray(p.risks)) p.risks = p.risks.map(r=>
          Array.isArray(r)?r:{...r});
        _projects.push(p);
      });
      _projects.sort((a,b)=>a.id.localeCompare(b.id));

      // Filter to specific project if URL param set
      const displayProjects = projParam
        ? _projects.filter(p=>p.id===projParam)
        : _projects.filter(p=>p.rag!=='complete');

      if (!displayProjects.length) {
        document.getElementById('portal-main').innerHTML =
          '<div class="error-box">Project not found. Please check the link provided to you.</div>';
        return;
      }

      if (!_activeId) _activeId = displayProjects[0].id;

      buildSelector(displayProjects);
      renderProject(_activeId);
      setupRealtimeListener();

    } catch(err) {
      document.getElementById('portal-main').innerHTML =
        '<div class="error-box">Unable to load project data. Please try again later.<br><small>'+err.message+'</small></div>';
    }
  }

  function buildSelector(projects) {
    if (projects.length <= 1) return; // hide selector if only one project
    const sel = document.getElementById('proj-selector');
    sel.style.display = 'flex';
    sel.innerHTML = projects.map(p=>
      `<button class="proj-btn${p.id===_activeId?' active':''}"
         onclick="window._switchProject('${p.id}')">${p.id} — ${p.name}</button>`
    ).join('');
  }

  window._switchProject = function(id) {
    _activeId = id;
    document.querySelectorAll('.proj-btn').forEach(b=>{
      b.classList.toggle('active', b.textContent.startsWith(id));
    });
    renderProject(id);
  };

  function renderProject(projId) {
    const p = _projects.find(x=>x.id===projId);
    if (!p) return;

    const pct    = p.pct_actual||0;
    const ragClass = p.rag==='green'?'rag-green':p.rag==='red'?'rag-red':p.rag==='amber'?'rag-amber':'rag-complete';
    const ragLabel = p.rag==='green'?'On Track':p.rag==='red'?'Needs Attention':p.rag==='amber'?'Under Review':'Completed';
    const ragColor = p.rag==='green'?'#1E6B2E':p.rag==='red'?'#9B1C1C':p.rag==='amber'?'#C9901A':'#185FA5';
    const planPct  = p.pct_plan||pct;

    // Milestones
    const ms = (p.milestones||[]);
    const msComplete = ms.filter(m=>{const mp=Array.isArray(m)?m[4]:m.pct; return mp===1;}).length;
    const msTotal    = ms.length;

    // WBS tasks
    const tasks = (p.wbsTasks||[]);
    const tasksDone = tasks.filter(t=>(t.pct||0)>=1).length;

    // Update log
    const updates = (p.updateLog||[]).slice().reverse().slice(0,3);

    const html = `
      <!-- Project Header -->
      <div class="proj-header">
        <div class="proj-header-top">
          <div>
            <div class="proj-id">${p.id} &nbsp;·&nbsp; ${p.type}</div>
            <div class="proj-title">${p.fullname}</div>
            <div class="proj-meta">Client: ${p.client} &nbsp;·&nbsp; PM: ${p.pm||'TBC'} &nbsp;·&nbsp; ${p.start||'TBC'} → ${p.end||'TBC'}</div>
          </div>
          <span class="rag-pill ${ragClass}">${ragLabel}</span>
        </div>
        <div class="progress-section">
          <div class="progress-label">
            <span class="progress-label-left">Overall Completion</span>
            <span class="progress-label-right">Planned: ${planPct}% &nbsp;·&nbsp; Actual: ${pct}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%;background:${ragColor}"></div>
          </div>
        </div>
      </div>

      <!-- KPI Tiles -->
      <div class="kpi-row">
        <div class="kpi-tile">
          <div class="kpi-tile-label">Contract Value</div>
          <div class="kpi-tile-val">₦${Math.round((p.contract||p.bac||0)/1e6)}M</div>
          <div class="kpi-tile-sub">Approved contract</div>
        </div>
        <div class="kpi-tile">
          <div class="kpi-tile-label">% Complete</div>
          <div class="kpi-tile-val" style="color:${ragColor}">${pct}%</div>
          <div class="kpi-tile-sub">Plan: ${planPct}%</div>
        </div>
        <div class="kpi-tile">
          <div class="kpi-tile-label">Milestones</div>
          <div class="kpi-tile-val">${msComplete}/${msTotal}</div>
          <div class="kpi-tile-sub">Achieved of total</div>
        </div>
        <div class="kpi-tile">
          <div class="kpi-tile-label">HSE Performance</div>
          <div class="kpi-tile-val" style="color:${(p.hse||1)>=0.95?'#1E6B2E':'#C9901A'}">${Math.round((p.hse||1)*100)}%</div>
          <div class="kpi-tile-sub">LTI: ${p.lti||0}</div>
        </div>
        <div class="kpi-tile">
          <div class="kpi-tile-label">Programme</div>
          <div class="kpi-tile-val" style="color:${ragColor}">${ragLabel}</div>
          <div class="kpi-tile-sub">Current status</div>
        </div>
      </div>

      <!-- Milestone Tracker -->
      <div class="section-card">
        <div class="section-title">📅 Milestone Tracker</div>
        ${ms.length ? ms.map(m=>{
          const ref     = Array.isArray(m)?m[0]:m.ref;
          const name    = Array.isArray(m)?m[1]:m.name;
          const planned = Array.isArray(m)?m[2]:m.planned;
          const actual  = Array.isArray(m)?m[3]:m.actual;
          const mpct    = Array.isArray(m)?m[4]:m.pct;
          const isComp  = mpct===1;
          const isOut   = actual==='OUTSTANDING';
          const isInProg= mpct>0&&mpct<1;
          const icon    = isComp?'✅':isOut?'⚠️':isInProg?'🔄':'⏳';
          const iconClass= isComp?'ms-icon-complete':isOut?'ms-icon-outstanding':isInProg?'ms-icon-inprog':'ms-icon-pending';
          const statusClass= isComp?'ms-status-complete':isOut?'ms-status-outstanding':isInProg?'ms-status-inprog':'ms-status-pending';
          const statusLabel= isComp?'Complete':isOut?'Outstanding':isInProg?'In Progress':'Pending';
          const dateLabel= isComp&&actual&&actual!=='OUTSTANDING'
            ? 'Achieved: '+actual
            : 'Planned: '+(planned||'TBC');
          return `<div class="milestone-item">
            <div class="ms-icon ${iconClass}">${icon}</div>
            <div class="ms-info">
              <div class="ms-name">${name}</div>
              <div class="ms-date">${dateLabel}</div>
            </div>
            <span class="ms-status ${statusClass}">${statusLabel}</span>
            <div class="ms-pct">${Math.round((mpct||0)*100)}%</div>
          </div>`;
        }).join('') : '<div style="color:#8B9BB4;font-size:13px">No milestones recorded yet.</div>'}
      </div>

      <!-- Tasks Executed -->
      ${tasks.length ? `<div class="section-card">
        <div class="section-title">🔨 Tasks Executed</div>
        ${tasks.filter(t=>(t.pct||0)>0).slice(0,10).map(t=>{
          const pctVal = Math.round((t.pct||0)*100);
          const isComp = pctVal>=100;
          const col    = isComp?'#1E6B2E':pctVal>50?'#0D7377':'#C9901A';
          return `<div class="task-item">
            <div class="task-header">
              <span class="task-name">${t.code?t.code+' — ':''}${t.name}</span>
              <span class="task-pct" style="color:${col}">${pctVal}%</span>
            </div>
            <div class="task-bar-track">
              <div class="task-bar-fill" style="width:${pctVal}%;background:${col}"></div>
            </div>
          </div>`;
        }).join('')}
        ${tasks.filter(t=>(t.pct||0)>0).length>10?`<div style="font-size:12px;color:#8B9BB4;margin-top:8px">+${tasks.filter(t=>(t.pct||0)>0).length-10} more tasks in progress</div>`:''}
      </div>` : ''}

      <!-- Recent Site Updates -->
      ${updates.length ? `<div class="section-card">
        <div class="section-title">📋 Recent Site Updates</div>
        ${updates.map(u=>`
          <div class="update-item">
            <div class="update-meta">${u.date||''} &nbsp;·&nbsp; ${u.period||''} ${u.by?'· '+u.by:''}</div>
            <div class="update-text">${(u.text||'').substring(0,300)}${(u.text||'').length>300?'...':''}</div>
          </div>`).join('')}
      </div>` : ''}

      <!-- Open Actions (client-facing only) -->
      ${(p.decisions||[]).filter(d=>(Array.isArray(d)?d[3]:d.urg)==='red').length ? `
      <div class="section-card" style="border-left:4px solid #9B1C1C;">
        <div class="section-title">⚡ Items Requiring Your Attention</div>
        ${(p.decisions||[]).filter(d=>(Array.isArray(d)?d[3]:d.urg)==='red').map(d=>`
          <div style="padding:10px;background:#FFF5F5;border-radius:6px;margin-bottom:8px;">
            <div style="font-size:13px;font-weight:600;color:#9B1C1C;margin-bottom:3px;">
              ${Array.isArray(d)?d[0]:d.text}
            </div>
            <div style="font-size:11px;color:#8B9BB4">
              Required from: ${Array.isArray(d)?d[1]:d.owner} &nbsp;·&nbsp; By: ${Array.isArray(d)?d[2]:d.deadline}
            </div>
          </div>`).join('')}
      </div>` : ''}
    `;

    document.getElementById('portal-main').innerHTML = html;
  }

  // ── Real-time listener — auto-refresh when data changes ─────────────────
  function setupRealtimeListener() {
    onSnapshot(collection(db, 'projects'), snap => {
      _projects = [];
      snap.forEach(d => {
        const p = d.data();
        if (Array.isArray(p.milestones)) p.milestones = p.milestones.map(m=>Array.isArray(m)?m:{...m});
        _projects.push(p);
      });
      _projects.sort((a,b)=>a.id.localeCompare(b.id));
      if (_activeId) renderProject(_activeId);
    });
  }

  loadProjects();
</script>
</body>
</html>
